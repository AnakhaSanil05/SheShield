<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart SOS & Safe Walk</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Smart SOS & Safe Walk</h1>
        <p>One tap safety solution for women</p>
    </header>

    <main>
        <!-- SOS Section -->
        <section class="sos-section">
            <h2>🚨 Emergency SOS</h2>
            <button id="sosBtn">SOS</button>
            <div id="preview"></div>
        </section>

        <!-- Trusted Contacts Section -->
        <section class="contacts-section">
            <h2>Trusted Contacts</h2>
            <div class="contact-form">
                <input type="text" id="name" placeholder="Name">
                <input type="text" id="number" placeholder="Phone (+CountryCode)">
                <button id="addContact">Add Contact</button>
            </div>
            <ul id="contactList"></ul>
        </section>

        <!-- Safe Walk Section -->
        <section class="safe-walk">
            <h2>Safe Walk Mode</h2>
            <input type="number" id="minutes" placeholder="Duration (minutes)">
            <button id="startWalk">Start Walk</button>
            <button id="safeBtn" style="display:none;">Reached Safely</button>
            <div id="timer"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Smart SOS. All rights reserved.</p>
    </footer>

<script src="script.js"></script>
</body>
</html>
